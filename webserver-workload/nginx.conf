# Custom nginx config for benchmarking
# Usage: nginx -c /path/to/this/nginx.conf

user uttu;
worker_processes auto;
pid /tmp/nginx_bench.pid;
error_log /dev/null crit;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 30;

    # Disable logging for benchmark purity
    access_log off;

    server {
        listen 127.0.0.1:8088;
        server_name localhost;

        # Small files
        location /small/ {
            alias /home/uttu/Desktop/spe-proj/webserver-workload/test_data/small/;
        }

        # Large files
        location /large/ {
            alias /home/uttu/Desktop/spe-proj/webserver-workload/test_data/large/;
        }
    }
}
